<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In · 10X CRM</title>
  <link rel="stylesheet" href="../css/styles.css" />

  <script src="../JS/guard.js"></script>
  <script>redirectIfLoggedIn();</script>
  
</head>
<body class="auth-page">

  <div id="toast-container"></div>

  <div class="auth-card">
    <div class="auth-logo">10X CRM</div>
    <h1>Welcome back</h1>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" />
      </div>

      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

    
    <script src="../JS/toast.js"></script>
    <script src="../JS/auth.js"></script>

</body>
</html>
